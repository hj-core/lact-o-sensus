syntax = "proto3";

package lacto_sensus.v1;

import "google/protobuf/timestamp.proto";

// --- Common Data Models ---

message GroceryItem {
    string item_key = 1;
    string quantity = 2; // Using string to transport Decimal safely
    string unit = 3;
    string category = 4; // Matches the 12-Point Taxonomy
    string last_modifier_id = 5;
    google.protobuf.Timestamp last_activity = 6;
    uint64 state_version = 7;
}

enum OperationType {
    OPERATION_TYPE_UNSPECIFIED = 0;
    OPERATION_TYPE_ADD = 1;      // Incremental: Add to current quantity
    OPERATION_TYPE_SUBTRACT = 2; // Decremental: Subtract from current quantity
    OPERATION_TYPE_SET = 3;      // Absolute: Overwrite current quantity
    OPERATION_TYPE_DELETE = 4;   // Removal: Remove item from inventory
}

message MutationIntent {
    string item_key = 1;
    string quantity = 2;
    optional string unit = 3; // Optional: If omitted, the system retains the existing unit for the item
    optional string category = 4; // Optional override by client
    OperationType operation = 5;
}

// --- Internal Ledger Entry (Replicated via Raft) ---

message CommittedMutation {
    // 1. Session Layer (ADR 006)
    string client_id = 1;
    uint64 sequence_id = 2;

    // 2. State Layer (Flattened Upsert)
    string item_key = 3;
    string updated_quantity = 4;
    string updated_category = 5;
    string updated_unit = 6;
    bool is_delete = 7;

    // 3. Metadata Layer
    google.protobuf.Timestamp event_time = 8;
}

// --- Consensus Service (Raft Peer-to-Peer) ---

service ConsensusService {
    rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
    rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

message RequestVoteRequest {
    uint64 term = 1;
    string candidate_id = 2;
    uint64 last_log_index = 3;
    uint64 last_log_term = 4;
}

message RequestVoteResponse {
    uint64 term = 1;
    bool vote_granted = 2;
}

message LogEntry {
    uint64 term = 1;
    uint64 index = 2;
    bytes data = 3; // Serialized mutation command (CommittedMutation)
}

message AppendEntriesRequest {
    uint64 term = 1;
    string leader_id = 2;
    uint64 prev_log_index = 3;
    uint64 prev_log_term = 4;
    repeated LogEntry entries = 5;
    uint64 leader_commit = 6;
}

message AppendEntriesResponse {
    uint64 term = 1;
    bool success = 2;
    uint64 last_log_index = 3; // Optimization for catch-up
}

// --- Ingress Service (Client-to-Leader) ---

service IngressService {
    rpc ProposeMutation(ProposeMutationRequest) returns (ProposeMutationResponse);
    rpc QueryState(QueryStateRequest) returns (QueryStateResponse);
}

message ProposeMutationRequest {
    string client_id = 1;
    uint64 sequence_id = 2;
    MutationIntent intent = 3;
}

enum MutationStatus {
    MUTATION_STATUS_UNSPECIFIED = 0;
    MUTATION_STATUS_COMMITTED = 1;
    MUTATION_STATUS_REJECTED = 2;
    MUTATION_STATUS_VETOED = 3;
}

message ProposeMutationResponse {
    MutationStatus status = 1;
    uint64 state_version = 2;
    string leader_hint = 3;
    string error_message = 4;
}

message QueryStateRequest {
    optional string query_filter = 1;
    optional uint64 min_state_version = 2;
}

enum QueryStatus {
    QUERY_STATUS_UNSPECIFIED = 0;
    QUERY_STATUS_SUCCESS = 1;
    QUERY_STATUS_REJECTED = 2; // Not the leader, use leader_hint
    QUERY_STATUS_ERROR = 3;    // Internal error, check error_message
}

message QueryStateResponse {
    repeated GroceryItem items = 1;
    uint64 current_state_version = 2;
    QueryStatus status = 3;
    string leader_hint = 4;
    string error_message = 5;
}

// --- Policy Service (Leader-to-AI) ---

service PolicyService {
    rpc EvaluateProposal(EvaluateProposalRequest) returns (EvaluateProposalResponse);
}

message EvaluateProposalRequest {
    string client_id = 1;
    MutationIntent intent = 2;
    repeated GroceryItem current_inventory = 3;
    string request_context = 4; // Optional: Flexible metadata (e.g., temporal context, economic constraints) to influence AI moral judgement
}

message EvaluateProposalResponse {
    bool is_approved = 1;
    string category_assignment = 2;
    string moral_justification = 3;
}
